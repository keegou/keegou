<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slice Detail · keegou</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#FDFAF7;color:#3A3A3A;font-family:'Lora',Georgia,serif;font-weight:400;font-size:11pt;line-height:2.0;-webkit-font-smoothing:antialiased}
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:#F6F1EC;border-bottom:1px solid #E0D6CC;font-family:'Inter',sans-serif;font-size:11pt;color:#8B6F5E}
.nav-inner{max-width:640px;margin:0 auto;padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:#8B6F5E}
.nav-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid #E0D6CC;opacity:.85}
.nav-links{display:flex;gap:24px;list-style:none}
.nav-links a{color:#8B6F5E;text-decoration:none}
.nav-links a:hover{opacity:.6}
.page{max-width:640px;margin:0 auto;padding:100px 24px 60px}
.detail-title{font-family:'Inter',sans-serif;font-weight:600;font-size:22pt;color:#8B6F5E;margin-bottom:12px}
.detail-price{font-family:'Inter',sans-serif;font-weight:400;font-size:12pt;color:#9B9B9B;margin-bottom:24px}
.detail-desc{font-size:12pt;color:#3A3A3A;margin-bottom:32px}
.btn-buy{display:inline-block;background:#8B6F5E;color:#FDFAF7;font-family:'Inter',sans-serif;font-size:11pt;padding:10px 28px;border:none;cursor:pointer;text-decoration:none;transition:opacity .2s}
.btn-buy:hover{opacity:.8}
.btn-dl{display:inline-block;background:none;color:#8B6F5E;font-family:'Inter',sans-serif;font-size:11pt;padding:10px 28px;border:1px solid #E0D6CC;text-decoration:none;margin-left:12px}
.btn-dl:hover{opacity:.6}
.back-link{display:block;font-family:'Inter',sans-serif;font-weight:400;font-size:10pt;color:#9B9B9B;margin-top:40px}
.back-link a{color:#8B6F5E;text-decoration:none}
.footer-text{font-family:'Inter',sans-serif;font-weight:300;font-size:10pt;color:#9B9B9B;text-align:center;margin-top:60px;padding-top:24px;border-top:1px solid #E0D6CC}
.footer-text a{color:#8B6F5E;text-decoration:none}
@media(max-width:640px){.detail-title{font-size:20pt}.page{padding:80px 20px 40px}.nav-links{gap:16px}}
</style>
</head>
<body>

<nav class="nav">
<div class="nav-inner">
<a class="nav-brand" href="index.html">
<img class="nav-avatar" src="" alt="keegou" id="avatar-img">
<span>keegou</span>
</a>
<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="shop.html">Slice Shop</a></li>
<li><a href="free.html">Free Slices</a></li>
<li><a href="about.html">About</a></li>
</ul>
</div>
</nav>

<div class="page" id="detail-content">
<div class="detail-title" id="detail-title">Life Bits</div>
<div class="detail-price" id="detail-price">$9 &middot; Pay What You Want</div>
<div class="detail-desc" id="detail-desc">Words I needed to hear — and maybe you do too.</div>
<a class="btn-buy" id="buy-btn" href="#" target="_blank">Buy</a>
<a class="btn-dl" id="dl-btn" href="#" target="_blank">Free Sample</a>
<p class="back-link"><a href="shop.html">← Back to Shop</a></p>
</div>

<div class="footer-text">Questions? Contact us at <a href="mailto:hello@keegou.com">hello@keegou.com</a></div>

<script>
document.getElementById('avatar-img').src = AVATAR_URL;
const params = new URLSearchParams(window.location.search);
const product = params.get('id');
const data = {
"life-bits":{title:"Life Bits",price:"$9 · Pay What You Want",desc:"Words I needed to hear — and maybe you do too.",buy:BUY_URL,dl:DOWNLOAD_URL},
"how-i-found-my-way":{title:"How I Found My Way",price:"$5 · Pay What You Want",desc:"Started out copying the wrong people. Ended up finding myself.",buy:BUY_URL,dl:DOWNLOAD_URL}
};
if(data[product]){const p=data[product];document.getElementById('detail-title').textContent=p.title;document.getElementById('detail-price').textContent=p.price;document.getElementById('detail-desc').textContent=p.desc;document.getElementById('buy-btn').href=p.buy;document.getElementById('dl-btn').href=p.dl}
</script>

</body>
</html>
