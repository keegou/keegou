<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tools · keegou</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Georgia,'Times New Roman',serif;
  background:#faf8f6;color:#3a3a3a;
  font-size:11pt;line-height:1.8;
  padding:48px 20px 60px;
  -webkit-font-smoothing:antialiased;
}
a{color:#8b6f5e;text-decoration:none}
a:hover{opacity:.6}
.page{max-width:600px;margin:0 auto}
.back{font-size:10pt;color:#bbb;margin-bottom:32px;display:block}
h1{font-weight:400;font-size:20pt;margin-bottom:4px;letter-spacing:-.3px}
.sub{font-size:10pt;color:#bbb;margin-bottom:40px;font-style:italic}

/* card grid */
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:48px}
@media(max-width:500px){.card-grid{grid-template-columns:1fr}}

.card-box{-webkit-tap-highlight-color:transparent;perspective:800px;cursor:pointer}
.card-box .inner{position:relative;width:100%;transition:transform .5s ease;transform-style:preserve-3d;min-height:190px}
.card-box.flipped .inner{transform:rotateY(180deg)}

.front,.back{
  position:absolute;width:100%;min-height:190px;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  padding:18px 16px;
  display:flex;flex-direction:column;justify-content:center;
  background:#fff;border:1px solid #e8e3dc;
}
.front{align-items:center;text-align:center}
.front .num{font-size:9pt;color:#d4cdc2;margin-bottom:4px}
.front .name{font-size:11pt;font-weight:600;color:#8b6f5e;line-height:1.3}
.front .hint{font-size:9pt;color:#ddd6cb;margin-top:8px;font-style:italic}

.back{transform:rotateY(180deg);align-items:flex-start;text-align:left;background:#f8f5f0}
.back .label{font-size:8pt;color:#ccc;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.back .name{font-size:11pt;font-weight:600;color:#8b6f5e;margin-bottom:5px}
.back .desc{font-size:9.5pt;color:#888;line-height:1.5}

/* purchase */
.buy{border-top:1px solid #e8e3dc;padding-top:32px;text-align:center;margin-bottom:32px}
.buy h2{font-weight:400;font-size:13pt;color:#8b6f5e;margin-bottom:4px}
.buy p{font-size:9.5pt;color:#bbb;margin-bottom:20px;font-style:italic}
.buy a{
  font-size:10pt;color:#8b6f5e;
  padding:8px 24px;border:1px solid #e0d6cc;
  display:inline-block;transition:all .2s;
}
.buy a:hover{background:#efe8e0;border-color:#d4c5b9}
.buy small{opacity:.6}

.foot{text-align:center;font-size:8pt;color:#ddd6cb;padding-top:16px}
.foot a{color:#ddd6cb}
.foot a:hover{color:#bbb}
</style>
</head>
<body>

<div class="page">
<a class="back" href="https://keegou.com">← Home</a>
<h1>Tools</h1>
<p class="sub">A few things I made. Free to use.</p>

<div class="card-grid" id="cardGrid"></div>

<div class="buy">
<h2>Cognitive Bias Cards</h2>
<p>Full deck · 50 cards · HTML file · one-time purchase</p>
<a href="https://www.creem.io/payment/prod_nNrbfZdJhpyQ5obDo2ZTw" target="_blank">Buy · $5</a>
</div>

<div class="foot">© keegou · <a href="https://keegou.com">back</a></div>
</div>

<script>
const cards = [
  {name:"Confirmation Bias",desc:"You look for evidence that supports what you already believe — and ignore everything else."},
  {name:"Anchoring",desc:"The first piece of information you hear quietly sets the bar for everything that follows."},
  {name:"Availability Heuristic",desc:"If something comes to mind easily, your brain assumes it's more common than it really is."},
  {name:"Dunning-Kruger Effect",desc:"The less you know, the more confident you feel. The more you learn, the less sure you become."},
  {name:"Sunk Cost Fallacy",desc:"You keep investing not because it's worth it — but because you've already put so much in."},
  {name:"Halo Effect",desc:"One good quality makes you assume everything else about a person is good too."},
  {name:"Loss Aversion",desc:"Losing something hurts about twice as much as gaining the same thing feels good."},
  {name:"Bandwagon Effect",desc:"The more people believe something, the more likely you are to believe it too."},
  {name:"Overconfidence Effect",desc:"You overestimate your own abilities — especially in areas you're unfamiliar with."},
  {name:"Self-Serving Bias",desc:"When you succeed, it's because of your skill. When you fail, it's because of bad luck."},
  {name:"Hindsight Bias",desc:"After something happens, you convince yourself you knew it all along."},
  {name:"Negativity Bias",desc:"Bad events and criticisms stick harder and longer than good ones."},
  {name:"Spotlight Effect",desc:"You think people notice you far more than they actually do."},
  {name:"Choice-Supportive Bias",desc:"Once you make a choice, you forget its flaws and remember only why it was right."},
  {name:"Framing Effect",desc:"How information is presented changes how you react — even if the facts are the same."},
  {name:"Barnum Effect",desc:"You accept broad, vague descriptions as highly accurate — like horoscopes."},
  {name:"Zeigarnik Effect",desc:"Unfinished tasks stick in your memory far longer than completed ones."},
  {name:"Recency Effect",desc:"The last thing you heard gets remembered better than what came before it."},
  {name:"False Consensus Effect",desc:"You assume most people think the same way you do — they often don't."},
  {name:"Curse of Knowledge",desc:"Once you know something, you can't imagine not knowing it — making it hard to explain."},
  {name:"Action Bias",desc:"In uncertainty, you feel the urge to 'do something' — even when doing nothing is smarter."},
  {name:"Planning Fallacy",desc:"You consistently underestimate how long something will take."},
  {name:"IKEA Effect",desc:"You overvalue things you partially created yourself."},
  {name:"Status Quo Bias",desc:"You prefer things to stay the same, simply because change feels risky."},
  {name:"Tragedy of the Commons",desc:"Everyone acts in their own short-term interest — until there's nothing left."},
  {name:"Pygmalion Effect",desc:"Higher expectations from others actually lead to better performance."},
  {name:"Gambler's Fallacy",desc:"You feel 'due' for a win — even though each outcome is independent."},
  {name:"Decoy Effect",desc:"Adding a worse option makes one of the original two look more attractive."},
  {name:"Reactance",desc:"When told 'you can't,' you immediately want to do it more."},
  {name:"Actor-Observer Bias",desc:"You blame others for their mistakes but excuse your own with circumstances."},
  {name:"Optimism Bias",desc:"You believe bad things are less likely to happen to you than to others."},
  {name:"Backfire Effect",desc:"When faced with evidence against your belief, you believe it even more strongly."},
  {name:"Clustering Illusion",desc:"Your brain sees patterns in random data — and thinks they mean something."},
  {name:"Declinism",desc:"You remember the past as better than it was and expect the future to be worse."},
  {name:"Endowment Effect",desc:"You value something more simply because you own it."},
  {name:"Forer Effect",desc:"You believe personality descriptions written for you are unique — even if they're generic."},
  {name:"Fundamental Attribution Error",desc:"You judge others by their character, but yourself by your circumstances."},
  {name:"Groupthink",desc:"A group makes worse decisions because everyone wants to avoid conflict."},
  {name:"Hyperbolic Discounting",desc:"You prefer a small reward now over a larger reward later — even when waiting is smarter."},
  {name:"Illusory Correlation",desc:"You believe two things are related just because they happen at the same time."},
  {name:"Just-World Hypothesis",desc:"You believe the world is fair — so victims must deserve what happened to them."},
  {name:"Mere Exposure Effect",desc:"The more you see something, the more you like it — even if you didn't at first."},
  {name:"Ostrich Effect",desc:"You avoid looking at information that might make you uncomfortable."},
  {name:"Peak-End Rule",desc:"You judge an experience not by the whole, but by its peak moment and how it ended."},
  {name:"Projection Bias",desc:"You assume others share your current feelings, preferences, or values."},
  {name:"Salience Bias",desc:"You focus on the most noticeable thing — and miss what matters more."},
  {name:"Selective Perception",desc:"Your expectations shape what you see — you notice what you expect to notice."},
  {name:"Semmelweis Reflex",desc:"You reject new evidence that contradicts your established beliefs — automatically."},
  {name:"Social Proof",desc:"You look at what others are doing to decide what's right for you."},
  {name:"Blindspot Bias",desc:"You can see biases in others easily — but you can't see your own."}
];

const grid = document.getElementById('cardGrid');
cards.forEach((card, i) => {
  const box = document.createElement('div');
  box.className = 'card-box';
  box.innerHTML = `
    <div class="inner">
      <div class="front">
        <div class="num">#${i+1}</div>
        <div class="name">${card.name}</div>
        <div class="hint">tap to flip</div>
      </div>
      <div class="back">
        <div class="label">cognitive bias</div>
        <div class="name">${card.name}</div>
        <div class="desc">${card.desc}</div>
      </div>
    </div>`;
  box.addEventListener('click', () => box.classList.toggle('flipped'));
  grid.appendChild(box);
});
</script>
</body>
</html>
